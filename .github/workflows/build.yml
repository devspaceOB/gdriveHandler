name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/gdriveHandler/gdriveHandler.csproj

      - name: Run tests
        run: dotnet test tests/gdriveHandler.Tests/gdriveHandler.Tests.csproj -c Release --nologo --no-restore

      - name: Publish — self-contained (primary)
        run: |
          dotnet publish src/gdriveHandler/gdriveHandler.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --nologo
        shell: pwsh

      - name: Publish — framework-dependent (secondary)
        run: |
          $tfm = "net10.0-windows10.0.26100.0"
          dotnet publish src/gdriveHandler/gdriveHandler.csproj `
            -c Release -r win-x64 --self-contained false `
            -p:WindowsAppSDKSelfContained=false `
            -o "src/gdriveHandler/bin/Release/$tfm/win-x64-fd/publish" `
            --nologo
        shell: pwsh

      - name: Collect artifacts
        shell: pwsh
        run: |
          $tfm = "net10.0-windows10.0.26100.0"
          $scExe = "src/gdriveHandler/bin/Release/$tfm/win-x64/publish/gdriveHandler.exe"
          $fdExe = "src/gdriveHandler/bin/Release/$tfm/win-x64-fd/publish/gdriveHandler.exe"

          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item $scExe "dist/gdriveHandler-x64.exe"
          Copy-Item $fdExe "dist/gdriveHandler-x64-fd.exe"

          $scSize = [math]::Round((Get-Item "dist/gdriveHandler-x64.exe").Length / 1MB, 1)
          $fdSize = [math]::Round((Get-Item "dist/gdriveHandler-x64-fd.exe").Length / 1MB, 1)
          Write-Host "Self-contained: $scSize MB"
          Write-Host "Framework-dependent: $fdSize MB"

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "gdriveHandler ${{ github.ref_name }}"
          body_path: .github/RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            dist/gdriveHandler-x64.exe
            dist/gdriveHandler-x64-fd.exe
            install.ps1
