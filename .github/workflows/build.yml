name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build artifacts
        shell: pwsh
        run: .\build.ps1

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "gdriveHandler ${{ github.ref_name }}"
          body_path: .github/RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            dist/gdriveHandler-*-x64-selfcontained.zip
            dist/gdriveHandler-*-x64-fd.zip
            install.ps1
