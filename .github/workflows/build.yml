name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/gdriveHandler/gdriveHandler.csproj

      - name: Run tests
        run: dotnet test tests/gdriveHandler.Tests/gdriveHandler.Tests.csproj -c Release --nologo --no-restore

      - name: Publish — self-contained folder
        shell: pwsh
        run: |
          dotnet publish src/gdriveHandler/gdriveHandler.csproj `
            -c Release -r win-x64 --self-contained true `
            -o dist/gdriveHandler-x64 --nologo
          if ($LASTEXITCODE -ne 0) { throw "publish failed" }

      - name: Zip release asset
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/gdriveHandler-x64/*" -DestinationPath "dist/gdriveHandler-x64.zip" -Force
          $zipSize = [math]::Round((Get-Item "dist/gdriveHandler-x64.zip").Length / 1MB, 1)
          Write-Host "Release zip: $zipSize MB"

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "gdriveHandler ${{ github.ref_name }}"
          body_path: .github/RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            dist/gdriveHandler-x64.zip
            install.ps1
